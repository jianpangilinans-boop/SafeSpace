<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - SafeSpace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4CAF50',
            secondary: '#E8F5E9',
            accent: '#FFB74D',
            foreground: '#1a1a1a',
            muted: {
              DEFAULT: '#f5f5f5',
              foreground: '#717182'
            },
            border: 'rgba(0, 0, 0, 0.1)',
            'input-background': '#f3f3f5'
          },
          fontFamily: {
            sans: ['Poppins', 'Inter', 'system-ui', 'sans-serif']
          },
          borderRadius: {
            DEFAULT: '12px',
            'lg': '12px',
            'xl': '16px',
            '2xl': '20px'
          }
        }
      }
    }
  </script>
  <style>
    body {
      font-family: 'Poppins', 'Inter', system-ui, sans-serif;
      color: #1a1a1a;
      background-color: #E8F5E9;
    }
    .shadow-soft {
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .shadow-lg {
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-lg">
      <!-- Card Header -->
      <div class="p-8 pb-4 space-y-2">
        <h2 class="text-2xl font-semibold">Join SafeSpace</h2>
        <p class="text-base text-muted-foreground">
          Start your mental wellness journey today
        </p>
      </div>

      <!-- Card Content -->
      <div class="p-8 pt-4">
        <form onsubmit="handleSignup(event)" class="space-y-6">
          <!-- Full Name Field -->
          <div class="space-y-2">
            <label for="fullName" class="block text-base font-medium">Full Name</label>
            <input 
              type="text" 
              id="fullName" 
              name="fullName"
              placeholder="John Doe"
              required
              class="w-full px-4 py-3 bg-input-background border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary"
            />
          </div>

          <!-- Email Field -->
          <div class="space-y-2">
            <label for="email" class="block text-base font-medium">Email</label>
            <input 
              type="email" 
              id="email" 
              name="email"
              placeholder="your@email.com"
              required
              class="w-full px-4 py-3 bg-input-background border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary"
            />
          </div>

          <!-- Password Field -->
          <div class="space-y-2">
            <label for="password" class="block text-base font-medium">Password</label>
            <input 
              type="password" 
              id="password" 
              name="password"
              placeholder="••••••••"
              required
              minlength="8"
              class="w-full px-4 py-3 bg-input-background border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary"
            />
            <p class="text-xs text-muted-foreground">Must be at least 8 characters</p>
          </div>

          <!-- Confirm Password Field -->
          <div class="space-y-2">
            <label for="confirmPassword" class="block text-base font-medium">Confirm Password</label>
            <input 
              type="password" 
              id="confirmPassword" 
              name="confirmPassword"
              placeholder="••••••••"
              required
              class="w-full px-4 py-3 bg-input-background border-0 rounded-xl focus:outline-none focus:ring-2 focus:ring-primary"
            />
          </div>

          <!-- Terms Checkbox -->
          <label class="flex items-start gap-2 cursor-pointer">
            <input 
              type="checkbox" 
              id="terms"
              required
              class="w-4 h-4 mt-1 rounded border-border text-primary focus:ring-primary"
            />
            <span class="text-sm text-muted-foreground">
              I agree to the <a href="#" class="text-primary hover:text-primary/80">Terms of Service</a> and <a href="#" class="text-primary hover:text-primary/80">Privacy Policy</a>
            </span>
          </label>

          <!-- Submit Button -->
          <button 
            type="submit"
            class="w-full py-3 bg-primary text-white rounded-xl hover:bg-primary/90 transition-colors font-semibold shadow-soft"
          >
            Create Account
          </button>

          <!-- Divider -->
          <div class="relative py-4">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-border"></div>
            </div>
            <div class="relative flex justify-center">
              <span class="px-4 bg-white text-sm text-muted-foreground">Or sign up with</span>
            </div>
          </div>

          <!-- Social Signup Buttons -->
          <div class="grid grid-cols-2 gap-4">
            <button 
              type="button"
              onclick="handleSocialSignup('google')"
              class="flex items-center justify-center gap-2 px-4 py-3 border border-border rounded-xl hover:bg-secondary transition-colors"
            >
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M18.1712 8.36788H17.4998V8.33329H9.99984V11.6666H14.7095C14.0225 13.6069 12.1762 15 9.99984 15C7.23859 15 4.99984 12.7612 4.99984 9.99996C4.99984 7.23871 7.23859 4.99996 9.99984 4.99996C11.2748 4.99996 12.4342 5.48079 13.3169 6.26621L15.6736 3.90954C14.1857 2.52204 12.1948 1.66663 9.99984 1.66663C5.39775 1.66663 1.6665 5.39788 1.6665 9.99996C1.6665 14.602 5.39775 18.3333 9.99984 18.3333C14.6019 18.3333 18.3332 14.602 18.3332 9.99996C18.3332 9.44121 18.2815 8.89538 18.1712 8.36788Z" fill="#FFC107"/>
                <path d="M2.62744 6.12121L5.36536 8.12913C6.10619 6.29496 7.90036 5.00004 9.99994 5.00004C11.2749 5.00004 12.4344 5.48088 13.3169 6.26629L15.6736 3.90963C14.1857 2.52213 12.1949 1.66671 9.99994 1.66671C6.79911 1.66671 4.02328 3.47379 2.62744 6.12121Z" fill="#FF3D00"/>
                <path d="M9.99984 18.3334C12.1527 18.3334 14.1081 17.5096 15.5869 16.17L13.0077 13.9875C12.1429 14.6452 11.0863 15.0009 9.99984 15C7.83234 15 5.99109 13.6179 5.29859 11.6892L2.58109 13.7829C3.96026 16.4817 6.76109 18.3334 9.99984 18.3334Z" fill="#4CAF50"/>
                <path d="M18.1713 8.36796H17.5V8.33337H10V11.6667H14.7096C14.3809 12.5902 13.7889 13.3972 13.0067 13.988L13.0079 13.9871L15.587 16.1696C15.4046 16.3355 18.3333 14.1667 18.3333 10C18.3333 9.44129 18.2817 8.89546 18.1713 8.36796Z" fill="#1976D2"/>
              </svg>
              Google
            </button>
            <button 
              type="button"
              onclick="handleSocialSignup('github')"
              class="flex items-center justify-center gap-2 px-4 py-3 border border-border rounded-xl hover:bg-secondary transition-colors"
            >
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M10 0C4.475 0 0 4.475 0 10C0 14.425 2.8625 18.1625 6.8375 19.4875C7.3375 19.575 7.525 19.275 7.525 19.0125C7.525 18.775 7.5125 17.9875 7.5125 17.15C5 17.6125 4.35 16.5375 4.15 15.975C4.0375 15.6875 3.55 14.8 3.125 14.5625C2.775 14.375 2.275 13.9125 3.1125 13.9C3.9 13.8875 4.4625 14.625 4.65 14.925C5.55 16.4375 6.9875 16.0125 7.5625 15.75C7.65 15.1 7.9125 14.6625 8.2 14.4125C5.975 14.1625 3.65 13.3 3.65 9.475C3.65 8.3875 4.0375 7.4875 4.675 6.7875C4.575 6.5375 4.225 5.5125 4.775 4.1375C4.775 4.1375 5.6125 3.875 7.525 5.1625C8.325 4.9375 9.175 4.825 10.025 4.825C10.875 4.825 11.725 4.9375 12.525 5.1625C14.4375 3.8625 15.275 4.1375 15.275 4.1375C15.825 5.5125 15.475 6.5375 15.375 6.7875C16.0125 7.4875 16.4 8.375 16.4 9.475C16.4 13.3125 14.0625 14.1625 11.8375 14.4125C12.2 14.725 12.5125 15.325 12.5125 16.2625C12.5125 17.6 12.5 18.675 12.5 19.0125C12.5 19.275 12.6875 19.5875 13.1875 19.4875C15.1726 18.8173 16.8976 17.5414 18.1197 15.8395C19.3418 14.1375 19.9994 12.0952 20 10C20 4.475 15.525 0 10 0Z" fill="#1a1a1a"/>
              </svg>
              GitHub
            </button>
          </div>
        </form>

        <!-- Login Link -->
        <div class="mt-6 text-center text-sm">
          <span class="text-muted-foreground">Already have an account? </span>
          <a href="login.html" class="text-primary hover:text-primary/80 font-medium">Log in</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    function handleSignup(event) {
      event.preventDefault();
      const fullName = document.getElementById('fullName').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // Validate passwords match
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }
      
      // Mock signup - in production, this would make an API call
      console.log('Signup attempt:', { fullName, email, password });
      
      // Redirect to dashboard
      window.location.href = 'dashboard.html';
    }

    function handleSocialSignup(provider) {
      console.log('Social signup with:', provider);
      // In production, this would initiate OAuth flow
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
